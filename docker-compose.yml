version: '3.7'

services:
  db:
    container_name: tea_postgres
    image: postgres:15.2
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-teastream}
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-teastream}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - teastream-backend

  redis:
    container_name: redis
    image: redis:5.0
    restart: always
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - teastream-backend

  backend:
    container_name: tea_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    # Override host-pointing URLs from .env so backend talks to compose-network
    # service names (db:5432, redis:6379) instead of localhost:5433 / :6379.
    environment:
      - NODE_ENV=production
      - APPLICATION_PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-teastream}?schema=public
      - POSTGRES_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-teastream}?schema=public
      - REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - 3000:3000
    networks:
      - teastream-backend
    # No HTTP healthcheck — main.ts doesn't expose /health yet.
    # TODO(observability): add a /health endpoint and wire HEALTHCHECK here.

volumes:
  postgres_data:
  redis_data:

networks:
  teastream-backend:
